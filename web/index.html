<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="IBC escrow address lookup for Cosmos chains and transfer channels."
    />
    <title>IBC Escrow Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./assets/app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">IBC transfer module</p>
          <h1>Escrow Explorer</h1>
        </div>
        <div class="status-pill" aria-live="polite">
          <span id="status-dot" class="status-dot" data-state="idle"></span>
          <span id="status-text">Ready</span>
        </div>
      </header>

      <section class="workspace" aria-label="IBC escrow lookup">
        <form id="lookup-form" class="panel control-panel">
          <div class="panel-title">
            <span>Lookup</span>
            <span class="panel-rule"></span>
          </div>

          <div class="field-grid">
            <label>
              <span>Source chain</span>
              <select
                id="source-chain-name"
                name="sourceChain"
                required
              >
                <option value="cosmoshub">cosmoshub cosmoshub-4</option>
                <option value="osmosis">osmosis osmosis-1</option>
                <option value="noble">noble noble-1</option>
              </select>
            </label>
            <label>
              <span>Destination chain</span>
              <select
                id="destination-chain-name"
                name="destinationChain"
                required
              >
                <option value="osmosis">osmosis osmosis-1</option>
                <option value="cosmoshub">cosmoshub cosmoshub-4</option>
                <option value="noble">noble noble-1</option>
              </select>
            </label>
            <label>
              <span>Endpoint</span>
              <select id="endpoint-mode" name="endpointMode">
                <option value="auto">Auto</option>
                <option value="lazy-lb">Lazy-LB</option>
                <option value="direct-rest">Direct REST</option>
              </select>
            </label>
          </div>

          <div class="field-grid secondary-grid">
            <label>
              <span>Channel override</span>
              <input
                id="channel-id"
                name="channel"
                pattern="channel-[0-9]+"
                autocomplete="off"
                spellcheck="false"
              />
            </label>
            <label>
              <span>Port</span>
              <input id="port-id" name="port" autocomplete="off" spellcheck="false" />
            </label>
          </div>

          <input id="lazy-lb-base-url" name="lazyLbBaseUrl" type="hidden" />

          <div id="direct-rest-field" class="field-grid direct-grid" hidden>
            <label>
              <span>Source REST endpoint</span>
              <input
                id="source-direct-rest-base-url"
                name="sourceDirectRestBaseUrl"
                type="url"
                autocomplete="off"
                spellcheck="false"
              />
            </label>
            <label>
              <span>Destination REST endpoint</span>
              <input
                id="destination-direct-rest-base-url"
                name="destinationDirectRestBaseUrl"
                type="url"
                autocomplete="off"
                spellcheck="false"
              />
            </label>
          </div>

          <div class="inline-options">
            <label class="check-row">
              <input id="include-details" type="checkbox" />
              <span>Channel details</span>
            </label>
            <div class="actions">
              <button id="reset-button" type="button" class="secondary-button">Reset</button>
              <button id="lookup-button" type="submit" class="primary-button">Lookup</button>
            </div>
          </div>

        </form>

        <aside class="panel side-panel">
          <div class="panel-title">
            <span>Recent</span>
            <span class="panel-rule"></span>
          </div>
          <div id="history-body" class="history-list"></div>
        </aside>
      </section>

      <section class="result-grid" aria-live="polite">
        <article id="result-panel" class="panel result-panel" hidden>
          <div class="panel-title">
            <span>Escrow</span>
            <span class="panel-rule"></span>
          </div>
          <div id="result-body" class="kv-list"></div>
        </article>

        <article id="detail-panel" class="panel result-panel" hidden>
          <div class="panel-title">
            <span>Channel</span>
            <span class="panel-rule"></span>
          </div>
          <div id="detail-body" class="kv-list"></div>
        </article>

        <article id="balances-panel" class="panel trace-panel" hidden>
          <div class="panel-title">
            <span id="balances-title">Balances</span>
            <span class="panel-rule"></span>
          </div>
          <div id="balances-body" class="balance-list"></div>
        </article>

        <article id="comparison-panel" class="panel trace-panel" hidden>
          <div class="panel-title">
            <span id="comparison-title">Destination Supply</span>
            <span class="panel-rule"></span>
          </div>
          <div id="comparison-body" class="comparison-list"></div>
        </article>

        <article id="trace-panel" class="panel trace-panel" hidden>
          <div class="panel-title">
            <span>Requests</span>
            <span class="panel-rule"></span>
          </div>
          <div id="trace-body" class="trace-list"></div>
        </article>
      </section>
    </main>
  </body>
</html>
